        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* ===== LOADER ===== */
        .loader {
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.4s ease;
        }
        .loader.hide {
            opacity: 0;
            pointer-events: none;
        }
        .loader-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(245,158,11,0.15);
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Contenuto nascosto fino al caricamento */
        .page-content {
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .page-content.loaded {
            opacity: 1;
        }

        }
        @keyframes pulse-green {

            50% { box-shadow: 0 4px 35px rgba(37,211,102,0.5), 0 0 0 6px rgba(37,211,102,0.08); }
        }

        .cta-phone {

            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.85rem 1.5rem;

            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 600;
            font-family: var(--font);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .cta-phone:hover {

    <!-- TRACKING + LOADER LOGIC -->
    <script>
        (function() {
            // Tracking volantino
            var params = new URLSearchParams(window.location.search);
            var variant = params.get('v') || 'diretto';
            sessionStorage.setItem('volantino_variante', variant);
            console.log('[Simon Silver] Volantino variante:', variant);

            // Loader: aspetta che l'immagine sia caricata
            var img = document.getElementById('hero-img');
            var loader = document.getElementById('loader');
            var content = document.getElementById('page-content');

            function showPage() {
                loader.classList.add('hide');
                content.classList.add('loaded');
                setTimeout(function() { loader.style.display = 'none'; }, 400);
            }

            if (img.complete) {
                showPage();
            } else {
                img.addEventListener('load', showPage);
                img.addEventListener('error', showPage); // mostra comunque se c'è errore
            }

            // Fallback: mostra dopo 4 secondi max
            setTimeout(showPage, 4000);
        })();
    </script>
